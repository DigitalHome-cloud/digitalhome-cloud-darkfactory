# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

enum LOCALE {
  EN
  FR
  DE
}

type UserProfile @model @auth(rules: [{allow: private}]) {
  id: ID!
  owner: String
  displayName: String
  email: AWSEmail
  locale: LOCALE
  marketingOptIn: Boolean
}

type LibraryItem @model @auth(rules: [
  { allow: groups, groups: ["dhc-admins"], operations: [create, update, delete] },
  { allow: private, operations: [read] }
]) {
  id: ID!
  title: String!
  compatibleClasses: [String!]!
  region: String
  standards: [String]
  version: String!
  description: String
  hasActorCapability: Boolean
  hasSensorCapability: Boolean
  hasControllerCapability: Boolean
}

type SmartHome @model @auth(rules: [
  { allow: owner, ownerField: "owners", operations: [create, update, delete, read] },
  { allow: groups, groups: ["dhc-admins"], operations: [create, update, delete, read] },
  { allow: private, operations: [read] }
]) {
  id: ID!
  owners: [String]
  country: String!
  zip: String!
  streetCode: String!
  houseNumber: String!
  suffix: String!
  address: String
  description: String
  ownerName: String
}

type SmartHomeDesign @model @auth(rules: [{ allow: private }]) {
  id: ID!
  smartHomeId: String!
  version: Int!
  lastModified: AWSDateTime!
  lockedBy: String
  lockedAt: AWSDateTime
  ontologyVersion: String
}

